# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Tutorial: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # Site-level branding (for people/profiles, use the author system in content/authors/)
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: Israt Jahan Tulin
    type: person
    tagline: AI Researcher | Machine learning researcher
    description: Israt Jahan Tulin is a researcher with the AI Consulting Team at Helmholtz-Zentrum Dresden-Rossendorf (HZDR), where she develops and applies machine learning an
  theme:
    # Mode: 'light', 'dark', or 'system' (follows OS preference)
    mode: system
    pack: dracula
    colors:
      primary: fuchsia
      secondary: ""
      neutral: ""
  typography:
    font: sans
    size: md
  layout:
    radius: md
    spacing: comfortable
    avatar_shape: circle
  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: true
    language_switcher: true
    # Call-to-action button
    cta:
      enable: false
      text: ""
      url: ""

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # Site footer
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    language_switcher: true
  copyright:
    notice: © {year} {name}
  content:
    # Math rendering
    math:
      enable: false
    # Table of contents
    toc:
      enable: true
    # Reading time estimates
    reading_time:
      enable: true
    # Academic citations
    citations:
      style: apa                        # apa | mla | chicago | ieee

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # Site search
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: true
    # Trending/suggested search terms
    suggestions: []
    # Quick action shortcuts in search modal
    quick_actions: []

  # ────────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # User comments system
  # ────────────────────────────────────────────────────────────────────────────
  comments:
    enable: false
    provider: "giscus"                  # giscus | disqus
    giscus:
      repo: "username/repo-name"
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # Traffic and behavior analytics
  # ────────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: "G-XXXXXXXXXX"    # Google Analytics 4: G-XXXXXXXXXX
    google_tag_manager:
      container_id: "GTM-XXXXXXXXXX"    # GTM-XXXXXXX
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  # ────────────────────────────────────────────────────────────────────────────
  # VERIFICATION
  # Search engine site verification codes
  # ────────────────────────────────────────────────────────────────────────────
  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  # ────────────────────────────────────────────────────────────────────────────
  # REPOSITORY
  # Source code repository for "Edit this page" links
  # ────────────────────────────────────────────────────────────────────────────
  repository:
    enable: false
    url: ""                             # e.g., https://github.com/username/repo
    branch: main
    content_dir: content

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # Regional formatting preferences
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"          # Go time format
    time_format: "3:04 PM"
    address_format: en-us

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY
  # Security headers and policies (requires blox-plugin-netlify)
  # ────────────────────────────────────────────────────────────────────────────
  security:
    csp:
      policy: ""
      report_only: false
    frame_options: sameorigin           # deny | sameorigin | allow - sameorigin allows slides embedding
    permissions_policy: ""

  # ────────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # Privacy and compliance features
  # ────────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false
    anonymize_analytics: true

  # ────────────────────────────────────────────────────────────────────────────
  # DEBUG
  # Development and debugging (hidden in production)
  # ────────────────────────────────────────────────────────────────────────────
  debug:
    enable: false
    hud:
      position: bottom-left             # top-left | top-right | bottom-left | bottom-right
      opacity: 1.0
    export_logs: true

  # ────────────────────────────────────────────────────────────────────────────
  # PRO
  # Pro subscription features and affiliate program
  # ────────────────────────────────────────────────────────────────────────────
  pro:
    # Hide "Powered by HugoBlox" attribution
    # Requires: Pro subscription to support HugoBlox via alternative means
    # Note: Even with Pro, you can keep this false to support open source!
    # Get Pro: https://hugoblox.com/pro
    hide_attribution: false
    
    # Affiliate referral code for rewards program
    # Join affiliate program: https://hugoblox.com/affiliates
    affiliate_code: ""
